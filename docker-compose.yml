version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - AWS__Region=us-east-1
      - AWS__SQS__QueueUrl=https://sqs.us-east-1.amazonaws.com/061051257454/DevQueue

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - AWS__Region=us-east-1
      - AWS__SQS__QueueUrl=https://sqs.us-east-1.amazonaws.com/061051257454/DevQueue
